name: Daily Reorder Scan

on:
  schedule:
    # 04:00 UTC daily. Adjust as needed.
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  run-daily-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Request admin token
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          if [ -z "$API_BASE_URL" ] || [ -z "$ADMIN_USERNAME" ] || [ -z "$ADMIN_PASSWORD" ]; then
            echo "Missing required secrets: API_BASE_URL, ADMIN_USERNAME, ADMIN_PASSWORD"
            exit 1
          fi

          TOKEN_RESPONSE=$(curl -sS -X POST "$API_BASE_URL/auth/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "username=$ADMIN_USERNAME&password=$ADMIN_PASSWORD")

          ACCESS_TOKEN=$(echo "$TOKEN_RESPONSE" | python -c "import sys, json; print(json.load(sys.stdin).get('access_token', ''))")
          if [ -z "$ACCESS_TOKEN" ]; then
            echo "Failed to retrieve access token"
            echo "$TOKEN_RESPONSE"
            exit 1
          fi
          echo "ACCESS_TOKEN=$ACCESS_TOKEN" >> "$GITHUB_ENV"

      - name: Trigger daily reorder scan
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
        run: |
          curl -sS -X POST "$API_BASE_URL/jobs/daily-reorder-scan" \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/json"
