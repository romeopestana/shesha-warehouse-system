services:
  - type: web
    name: shesha-warehouse-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: bash scripts/render_start.sh
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: shesha-warehouse-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: DAILY_SCAN_AUTO_APPROVE_MAX_QUANTITY
        value: "0"

databases:
  - name: shesha-warehouse-db
    plan: free
